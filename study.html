<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study — Upper Room</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="stylesheet" href="css/styles.css?v=4">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="header-back">← My Studies</a>
    <a href="index.html" class="logo">Upper <span>Room</span></a>
    <div class="header-spacer"></div>
    <div id="header-user" class="header-user hidden">
      <span id="header-user-name" class="header-user-name"></span>
      <button id="header-signout" class="btn-header">Sign out</button>
    </div>
    <a id="header-signin" href="login.html" class="btn-header hidden">Sign In</a>
  </div>
</header>

<main>
  <div class="container">

    <!-- Loading -->
    <div id="loading" class="loading-block">
      <div class="spinner spinner-lg"></div>
      <span>Loading study…</span>
    </div>

    <!-- Error -->
    <div id="error" class="msg msg-error hidden" style="margin-top:24px;"></div>

    <!-- Content -->
    <div id="content" class="hidden">

      <h1 id="study-title" class="page-title"></h1>

      <!-- Join Code Card -->
      <div class="card mt-16">
        <div class="section-title">Share this study</div>
        <p class="text-muted" style="margin-bottom:8px;">Share this code so others can join:</p>
        <div class="join-code-box">
          <div id="join-code-value" class="join-code-value"></div>
          <button id="copy-code-btn" class="btn btn-sm btn-ghost">Copy</button>
        </div>
        <p class="text-muted mt-8" style="font-size:.8rem;">
          Or share the link:
          <span id="share-link" style="font-family:monospace;font-size:.8rem;word-break:break-all;"></span>
        </p>
      </div>

      <!-- Sessions -->
      <div class="mt-24">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <h2 class="page-title" style="margin-bottom:0;">Sessions</h2>
          <button id="new-session-btn" class="btn btn-accent btn-sm hidden">+ New Session</button>
        </div>

        <div id="session-list" class="session-list"></div>

        <!-- New session form (leader only) -->
        <div id="new-session-form" class="card mt-16 hidden">
          <h3 style="font-size:1rem;font-weight:700;color:var(--primary);margin-bottom:12px;">Add a session</h3>
          <form>
            <div class="form-group">
              <label for="new-passage">Scripture passage</label>
              <input type="text" id="new-passage" placeholder="e.g. Romans 8:1-17" autocomplete="off">
            </div>
            <div class="form-group">
              <label for="new-questions">Discussion questions <span class="text-muted">(one per line)</span></label>
              <textarea id="new-questions" rows="4" placeholder="What does Paul mean by 'no condemnation'?&#10;How does the Spirit help us in our weakness?"></textarea>
            </div>
            <div id="new-session-msg" class="msg hidden"></div>
            <div class="flex gap-8 mt-12">
              <button type="submit" id="submit-new-session" class="btn btn-primary flex-1">Add Session</button>
              <button type="button" id="cancel-new-session" class="btn btn-ghost">Cancel</button>
            </div>
          </form>
        </div>
      </div>

    </div><!-- /content -->

  </div>
</main>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js?v=4"></script>
<script src="js/auth.js?v=4"></script>
<script src="js/studies.js?v=4"></script>
<script src="js/sessions.js?v=4"></script>
<script src="js/app.js?v=4"></script>
<script>initStudy();</script>

</body>
</html>
