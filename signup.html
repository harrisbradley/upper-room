<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Upper Room</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="stylesheet" href="css/styles.css?v=5">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="logo">Upper <span>Room</span></a>
  </div>
</header>

<main>
  <div class="auth-page">

    <h1 class="page-title text-center">Create Account</h1>
    <p class="page-subtitle text-center">Start organizing your Bible study today.</p>

    <div class="card">

      <!-- Google -->
      <button id="google-signup" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
        Continue with Google
      </button>

      <div class="divider-text">or create with email</div>

      <form id="signup-form">
        <div class="form-group">
          <label for="signup-name">Your name</label>
          <input type="text" id="signup-name" placeholder="Jane Smith" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="text" id="signup-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signup-password">Password <span class="text-muted">(min. 6 characters)</span></label>
          <input type="text" id="signup-password" placeholder="••••••••" autocomplete="new-password"
                 style="-webkit-text-security:disc;text-security:disc;">
        </div>
        <div id="signup-msg" class="msg hidden"></div>
        <button type="submit" id="signup-submit" class="btn btn-primary btn-full btn-lg mt-8">Create Account</button>
      </form>

    </div>

    <p class="text-center mt-16 text-muted">
      Already have an account? <a href="login.html">Sign in</a>
    </p>

  </div>
</main>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js?v=5"></script>
<script src="js/auth.js?v=5"></script>
<script src="js/app.js?v=5"></script>
<script>initSignup();</script>

</body>
</html>
